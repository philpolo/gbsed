---
location_data:
    input_path: null #path to pkl containing scenegraph dataset training/testing data
    transfer_path: '../../Data/datasets/1043_transfer.pkl' #path to transfer dataset for transfer learning
    
model_configuration:
  num_relations: 12 #num of types of relations extracted, needed only for graph based models 
  model: 'mrgcn' #options: mrgcn, mrgin
  num_layers: 2 #defines number of RGCN conv layers.
  load_model: True #load pretrained model
  num_of_classes: 9 #8 #num of actors
  conv_type: 'FastRGCNConv'
  hidden_dim: 100
  layer_spec: null
  pooling_type: 'sagpool'
  pooling_ratio: 0.5
  readout_type: 'add'
  temporal_type: 'lstm_attn' #Options: 'lstm_attn' for task 'sequence classification', 'lstm_seq' for task 'collision prediction'
  lstm_input_dim: 50
  lstm_output_dim: 20
  nclass: 2 #dimension of final output
  dropout: 0.1 #dropout probability
  device: 'cuda' #device to place training/testing data batches
  activation: 'relu'
  model_load_path: '../../Models/1043_task_oriented_model.pt' #path to load pretrained model
  model_save_path: '../../Models/1043_task_oriented_model.pt' #path to save trained model
   
training_configuration:
  dataset_type: "scenegraph" #Options: real, scenegraph. scenegraph only option for graph based models
  scenegraph_dataset_type: "real" #type of data extracted to create input scenegraph data. Options: carla, real
  task_type: 'sequence_classification' #Options: sequence_classification, graph_classification, collision_prediction
  n_fold: 5 #number of folds for n-fold cross validation
  learning_rate: 0.00005 #0.00005 or 0.0001
  epochs: 200
  split_ratio: 0.3 #train-test split ratio
  downsample: False
  seed: 0 #seed used for train-test split
  batch_size: 16 #batch size of training, testing data
  test_step: 5 #perform test validation every n epochs
  weight_decay: 0.0005
  
wandb_configuration:
  entity: ''
  project: 'roadscene2vec'
